# Docker 내장 DNS. proxy_pass에 고정 이름을 쓰면 nginx 기동 시점의 IP 하나만 붙잡아
# --scale로 늘린 backend 인스턴스로 분산되지 않는다. 요청 시점에 재해석하게 한다.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # SPA 라우팅: 실제 파일이 없으면 index.html로 넘겨 react-router가 처리하게 한다.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 프록시.
    #
    # 프론트엔드와 백엔드를 같은 출처(same-origin)로 묶는다. 이렇게 하면
    # (1) 브라우저가 CORS preflight를 보내지 않고,
    # (2) 프론트엔드 번들에 백엔드 절대 주소를 구울 필요가 없어
    #     배포 도메인이 바뀌어도(터널 URL, 실제 도메인) 재빌드가 필요 없다.
    #
    # 이때 VITE_API_URL은 빈 문자열로 빌드해야 상대 경로 요청이 나간다.
    location /api/ {
        set $backend_upstream "backend:8080";
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # 헬스 프로브만 노출한다. 그 외 actuator 엔드포인트는 외부로 열지 않는다.
    location /actuator/health {
        set $health_upstream "backend:8080";
        proxy_pass http://$health_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
