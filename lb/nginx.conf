events {
    worker_connections 1024;
}

http {
    # Docker 내장 DNS. upstream 이름을 요청 시점에 재해석해야
    # `--scale backend=N`으로 늘어난 인스턴스가 즉시 반영된다.
    # (upstream 블록에 고정 이름을 쓰면 nginx 기동 시점의 IP 하나만 붙잡는다.)
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format upstream_log '$remote_addr - $status $request_time '
                            'upstream=$upstream_addr "$request"';
    access_log /dev/stdout upstream_log;

    # backend:8080은 compose 서비스명이며, Docker DNS가 replica IP 목록을
    # 라운드로빈 순서로 반환하므로 별도 upstream 블록 없이 분산된다.
    server {
        listen 80;

        # 로드밸런서 자신의 상태
        location = /lb-health {
            access_log off;
            return 200 "ok\n";
        }

        location / {
            set $backend_upstream "backend:8080";
            proxy_pass http://$backend_upstream;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 3s;
            proxy_read_timeout    30s;

            # 인스턴스 하나가 죽거나 재시작 중이면 다음 인스턴스로 넘긴다.
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }
    }
}
