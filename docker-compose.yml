x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  mysql:
    image: mysql:8.0
    container_name: subway_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: subway_monitoring
      MYSQL_USER: subway
      MYSQL_PASSWORD: subway123
      TZ: Asia/Seoul
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    mem_limit: 768m
    logging: *default-logging
    networks:
      - subway_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: subway_es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - path.repo=/usr/share/elasticsearch/snapshots
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - es_snapshots:/usr/share/elasticsearch/snapshots
    mem_limit: 2g
    logging: *default-logging
    networks:
      - subway_network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.2
    container_name: subway_logstash
    restart: unless-stopped
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "127.0.0.1:50000:50000"
    volumes:
      - ./logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
    mem_limit: 1g
    logging: *default-logging
    networks:
      - subway_network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: subway_kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      - elasticsearch
    mem_limit: 768m
    logging: *default-logging
    networks:
      - subway_network

  backend:
    build:
      context: ./backend
    container_name: subway_backend
    restart: unless-stopped
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=subway_monitoring
      - DB_USER=subway
      - DB_PASSWORD=subway123
      - LOGSTASH_HOST=logstash:50000
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ANOMALY_INDEX=subway-anomaly-results
      - REMEDIATION_INDEX=subway-remediation-actions
      - SUBWAY_API_KEY=${SUBWAY_API_KEY:-sample}
      - SUBWAY_API_KEY_SECONDARY=${SUBWAY_API_KEY_SECONDARY:-sample}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_NAME=${ADMIN_NAME:-관리자}
      - TZ=Asia/Seoul
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      logstash:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 3s
      retries: 5
      # JVM 기동 + 초기 수집이 끝날 시간을 준다.
      start_period: 60s
    mem_limit: 768m
    logging: *default-logging
    networks:
      - subway_network

  frontend:
    build:
      context: ./frontend
      args:
        # Pass backend URL so Vite can bake it into the static code.
        # This will be used by the browser to fetch API calls. 
        # For local development `localhost:8080` is correct. For production, change this to an actual domain.
        - VITE_API_URL=http://localhost:8080
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-}
    container_name: subway_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    mem_limit: 256m
    logging: *default-logging
    networks:
      - subway_network

  ai_model:
    build:
      context: ./ai_service
    container_name: subway_ai_model
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - LOG_INDEX_PATTERN=subway-logs-*
      - ANOMALY_INDEX=subway-anomaly-results
      - REMEDIATION_INDEX=subway-remediation-actions
      # 자동 대응: 제안만 생성한다. 실제 실행은 호스트의 remediation_worker.py가 담당한다.
      - REMEDIATION_ENABLED=${REMEDIATION_ENABLED:-true}
      - REMEDIATION_AUTO_APPROVE=${REMEDIATION_AUTO_APPROVE:-false}
      - REMEDIATION_MAX_REPLICAS=${REMEDIATION_MAX_REPLICAS:-4}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # 상시 관측: 기본 5분 간격. RUN_TIMES를 설정하면 고정 시각 모드로 동작한다.
      - RUN_INTERVAL_MINUTES=${RUN_INTERVAL_MINUTES:-5}
      - RUN_TIMES=${RUN_TIMES:-}
      - RUN_ON_STARTUP=${RUN_ON_STARTUP:-true}
      - MISFIRE_GRACE_SECONDS=${MISFIRE_GRACE_SECONDS:-3600}
      - LOOKBACK_MINUTES=${LOOKBACK_MINUTES:-10}
      # 디바운스: 연속 N회 감지되어야 확정 알람으로 승격 (플래핑 방지)
      - ANOMALY_CONSECUTIVE_N=${ANOMALY_CONSECUTIVE_N:-2}
      - TZ=Asia/Seoul
    depends_on:
      - elasticsearch
    mem_limit: 512m
    logging: *default-logging
    networks:
      - subway_network

volumes:
  mysql_data:
  es_data:
  es_snapshots:

networks:
  subway_network:
